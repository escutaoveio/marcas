<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mapa de Soluções — IVA Química</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #EDE8DD;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, sans-serif;
      min-height: 100vh;
    }

    /* ── Wrapper ─────────────────────────────────────────────────── */
    .page {
      padding: 40px 48px 48px;
    }

    /* ── Matrix ──────────────────────────────────────────────────── */
    .matrix {
      display: grid;
      /* 1 col para labels de dept + 7 colunas de marca */
      grid-template-columns: 196px repeat(7, 1fr);
      gap: 3px;
      background: #C8C1B2;   /* gap vira linha de grade */
      border: 3px solid #C8C1B2;
      border-radius: 10px;
      overflow: hidden;
    }

    /* Canto superior esquerdo */
    .corner {
      background: #E4DED2;
      display: flex;
      align-items: flex-end;
      padding: 10px 12px;
      font-size: 0.5rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #AEA598;
      gap: 4px;
    }

    /* ── Cabeçalho de marca (coluna) ─────────────────────────────── */
    .brand-col {
      background: #E4DED2;
      height: 104px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 12px;
    }

    .brand-label {
      writing-mode: vertical-lr;
      transform: rotate(180deg);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: #2a2a2a;
    }

    /* ── Separador de grupo ───────────────────────────────────────── */
    .group-sep {
      grid-column: 1 / -1;
      background: #DDD8CC;
      padding: 5px 14px;
      font-size: 7.5px;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #AEA598;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .group-sep::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #C8C1B2;
    }

    /* ── Label de departamento (linha) ───────────────────────────── */
    .dept-row {
      background: #E8E3D8;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 14px 0 12px;
      font-size: 11.5px;
      font-weight: 700;
      color: #1a1a1a;
      min-height: 58px;
    }

    .dept-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--dc);
    }

    /* ── Célula ──────────────────────────────────────────────────── */
    .cell {
      min-height: 58px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cell.miss {
      background: #EBE6DB;
    }

    .cell.hit {
      background: var(--dc);
      cursor: pointer;
      position: relative;
      transition: filter 0.12s ease, transform 0.12s ease;
    }

    .cell.hit:hover {
      filter: brightness(1.12);
      z-index: 2;
    }

    .hit-count {
      font-size: 1.25rem;
      font-weight: 900;
      color: var(--tc);
      opacity: 0.45;
      line-height: 1;
      user-select: none;
    }

    /* ── Legenda ─────────────────────────────────────────────────── */
    .legend-wrap {
      margin-top: 28px;
    }

    .legend-title {
      font-size: 0.5rem;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #B0A898;
      margin-bottom: 12px;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 22px;
    }

    .leg {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.6875rem;
      font-weight: 600;
      color: #555;
    }

    .leg-pill {
      width: 22px;
      height: 5px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    /* ── Footer ──────────────────────────────────────────────────── */
    .footer {
      margin-top: 24px;
      padding-top: 14px;
      border-top: 1px solid #D5CFBF;
      display: flex;
      justify-content: space-between;
      font-size: 0.5625rem;
      color: #C0B8A8;
    }

    /* ── Tooltip ─────────────────────────────────────────────────── */
    #tip {
      position: fixed;
      background: #fff;
      border: 1.5px solid #E0D9CE;
      border-radius: 14px;
      padding: 14px 17px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.1s ease;
      z-index: 999;
      max-width: 240px;
      box-shadow: 0 10px 28px rgba(0,0,0,.13);
    }

    #tip.on { opacity: 1; }

    .tip-brand {
      font-size: 0.625rem;
      font-weight: 900;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .tip-dept {
      font-size: 0.5rem;
      color: #bbb;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
    }

    .tip-items {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .tip-items li {
      font-size: 0.6875rem;
      color: #444;
      padding-left: 13px;
      position: relative;
      line-height: 1.4;
    }

    .tip-items li::before {
      content: '—';
      position: absolute;
      left: 0;
      color: #ddd;
      font-size: 0.5625rem;
      top: 3px;
    }
  </style>
</head>
<body>

<div class="page">
  <div class="matrix" id="matrix"></div>

  <div class="legend-wrap">
    <div class="legend-title">Departamentos</div>
    <div class="legend" id="legend"></div>
  </div>

  <div class="footer">
    <span>Passe o cursor sobre uma célula para ver os produtos · IVA Química — Inteligência Operacional</span>
    <span>Jun 2026</span>
  </div>
</div>

<div id="tip"></div>

<script>
  // ── Dados ─────────────────────────────────────────────────────────

  const DEPTS = [
    { name: 'Impermeabilização',    color: '#02B11E', tc: '#fff' },
    { name: 'Alvenaria',            color: '#4B4B4B', tc: '#fff' },
    { name: 'Construção a Seco',    color: '#14B8A6', tc: '#fff' },
    { name: 'Gesso & Drywall',      color: '#FF4444', tc: '#fff' },
    { name: 'Pequenos Reparos',     color: '#FEBF13', tc: '#111' },
    { name: 'Revestimentos',        color: '#6A05A1', tc: '#fff' },
    { name: 'Efeitos Decorativos',  color: '#F9B20E', tc: '#111' },
    { name: 'Pintura e Acabamento', color: '#3A86FF', tc: '#fff' },
    { name: 'Artesanato',           color: '#FF006E', tc: '#fff' },
    { name: 'Jardinagem',           color: '#004239', tc: '#fff' },
    { name: 'Limpeza e Pós Obra',   color: '#00C6E0', tc: '#111' },
    { name: 'Marcenaria',           color: '#A0522D', tc: '#fff' },
  ];

  const BRANDS = [
    'Elastment',       // 0
    'Drylevis',        // 1
    'O Pulo do Gato',  // 2
    'Cristal',         // 3
    'Smart',           // 4
    'Hold Stone',      // 5
    'LT Shine',        // 6
  ];

  const NODES = {
    '0,0': ['Mantas Impermeabilizantes', 'Cimento Elástico + Baldrame', 'Acqua Zero'],
    '0,2': ['Lajes e Piscinas', 'Telhados e Trincas'],
    '0,3': ['Impermeabilizantes', 'Telhas e Trincas', 'Protelha'],
    '1,0': ['Aditivos', 'Colas e Rejuntes'],
    '1,1': ['Aditivos', 'Estruturantes'],
    '1,2': ['Aditivos e Estruturas', 'Chapiskola', 'Tech Concreto'],
    '2,0': ['Bases e Primers', 'Chapisco Flex'],
    '2,1': ['Preparo', 'Zero Trinca', 'Estruturantes'],
    '3,0': ['Aditivos — SOS Gesso', 'Perfect Cola+'],
    '3,1': ['Preparo', 'Drymix', 'Massa Acrílica'],
    '3,2': ['Blinda Gesso'],
    '4,0': ['Reparos', 'SOS Umidade', 'Rapid Cure', 'Drymanta'],
    '4,2': ['Telhados e Trincas', 'Rodapé', 'Salva Rufo'],
    '4,3': ['Zero Mofo', 'Protelha Fast'],
    '4,4': ['SOS Ferrugem'],
    '5,3': ['Azulejo Líquido', 'Nex Floor'],
    '5,4': ['Cimento Queimado', 'Concrete Stain', 'Smart Color Design'],
    '5,5': ['Revest'],
    '5,6': ['Linha Pisos', 'Linha Marmorite', 'Grannistone'],
    '6,3': ['Azulejo Líquido'],
    '6,4': ['Smart Color Design', 'Smart Color Finish'],
    '6,6': ['Linha Efeitos', 'Grannistone', 'Linha Marmorite', 'Cimento Queimado'],
    '7,0': ['Scudo PRO', 'Bases e Primers', 'UltraGrip'],
    '7,2': ['Tintas e Efeitos', 'Conversor de Ferrugem', 'Sobre Ferrugem'],
    '7,3': ['Tintas e Acessórios', 'Skin-Color', 'Tinta Magnética'],
    '7,4': ['Smart Color Finish', 'Tintas PUD'],
    '7,6': ['Linha Tintas', 'Dual Cryl', 'Cortina Líquida'],
    '8,4': ['Cimento Queimado', 'Smart Color Design'],
    '8,6': ['Linha Efeitos', 'Grannistone', 'Sand Shine', 'Stone Make'],
    '9,2': ['Limpeza e Jardim', 'Fixador de Pedras'],
    '9,5': ['Garden', 'Pedras', 'Color Stone', 'Fixador de Pedras Soltas'],
    '10,2': ['Limpeza e Jardim', 'Limpa Tinta'],
    '10,3': ['Limpeza e Jardim', 'Tira Tintas'],
    '10,5': ['Pro — Clean Tool'],
    '11,1': ['Estruturantes — Dryfit'],
    '11,4': ['Tintas PUD'],
  };

  const GROUPS = [
    { label: 'Construção',    depts: [0, 1, 2, 3, 4] },
    { label: 'Decoração',     depts: [5, 6, 7, 8] },
    { label: 'Especialidade', depts: [9, 10, 11] },
  ];

  // ── Monta a grade ─────────────────────────────────────────────────

  const matrix = document.getElementById('matrix');
  const rows = [];

  // Canto + cabeçalhos de marca
  rows.push(`<div class="corner">↓ Dept &nbsp; Marca →</div>`);
  BRANDS.forEach(b => {
    rows.push(`<div class="brand-col"><div class="brand-label">${b}</div></div>`);
  });

  // Grupos e linhas de departamento
  GROUPS.forEach(group => {
    rows.push(`<div class="group-sep">${group.label}</div>`);

    group.depts.forEach(di => {
      const dept = DEPTS[di];

      // Label do departamento
      rows.push(`
        <div class="dept-row" style="--dc:${dept.color}">
          <span class="dept-dot"></span>${dept.name}
        </div>
      `);

      // Células de cada marca
      BRANDS.forEach((brand, bi) => {
        const key = `${di},${bi}`;
        const items = NODES[key];
        if (items) {
          const prods = items.join('||');
          rows.push(`
            <div class="cell hit"
              style="--dc:${dept.color};--tc:${dept.tc}"
              data-brand="${brand}"
              data-dept="${dept.name}"
              data-color="${dept.color}"
              data-products="${prods}">
              <span class="hit-count">${items.length}</span>
            </div>
          `);
        } else {
          rows.push(`<div class="cell miss"></div>`);
        }
      });
    });
  });

  matrix.innerHTML = rows.join('');

  // ── Tooltip ───────────────────────────────────────────────────────

  const tip = document.getElementById('tip');

  matrix.addEventListener('mousemove', e => {
    const cell = e.target.closest('.cell.hit');
    if (!cell) { tip.classList.remove('on'); return; }

    const brand    = cell.dataset.brand;
    const dept     = cell.dataset.dept;
    const color    = cell.dataset.color;
    const products = cell.dataset.products.split('||');

    tip.innerHTML = `
      <div class="tip-brand" style="color:${color}">${brand}</div>
      <div class="tip-dept">${dept}</div>
      <ul class="tip-items">${products.map(p => `<li>${p}</li>`).join('')}</ul>
    `;
    tip.classList.add('on');

    const tx = Math.min(e.clientX + 18, window.innerWidth  - 258);
    const ty = Math.min(e.clientY -  8, window.innerHeight - tip.scrollHeight - 10);
    tip.style.left = tx + 'px';
    tip.style.top  = Math.max(8, ty) + 'px';
  });

  matrix.addEventListener('mouseleave', () => tip.classList.remove('on'));

  // ── Legenda ───────────────────────────────────────────────────────

  const legEl = document.getElementById('legend');
  DEPTS.forEach(d => {
    const item = document.createElement('div');
    item.className = 'leg';
    item.innerHTML = `<div class="leg-pill" style="background:${d.color}"></div>${d.name}`;
    legEl.appendChild(item);
  });
</script>
</body>
</html>
